<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes - FitLife Gym</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
    <!-- ===== NAVEGACIÓN ===== -->
    <nav class="dashboard-nav">
        <h2>🏋️ FitLife Gym</h2>
        <ul>
            <li><a href="dashboard.html">📊 Dashboard</a></li>
            <li><a href="clientes.html" class="active">👥 Clientes</a></li>
            <li><a href="horarios.html">📅 Horarios</a></li>
            <li><a href="index.html">🏠 Inicio</a></li>
        </ul>
    </nav>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <main class="dashboard-main">
        <h1>Gestión de Clientes</h1>

        <!-- Formulario -->
        <section class="form-section">
            <h2 id="formTitle">Agregar Nuevo Cliente</h2>
            <form id="clienteForm">
                <input type="hidden" id="clienteId" />
                <div class="form-group">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required />
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="Ej: juan@email.com" required />
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono:</label>
                    <input type="text" id="telefono" placeholder="Ej: 999-999-999" required />
                </div>
                <div class="form-group">
                    <label for="estado">Estado:</label>
                    <select id="estado">
                        <option value="activo">Activo</option>
                        <option value="inactivo">Inactivo</option>
                    </select>
                </div>
                <button type="submit" id="btnGuardar">Guardar Cliente</button>
                <button type="button" id="btnCancelar" style="display: none">Cancelar Edición</button>
            </form>
        </section>

        <!-- Tabla -->
        <section class="table-section">
            <h2>Lista de Clientes</h2>
            <div class="table-container">
                <table id="tablaClientes">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Teléfono</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla">
                        <!-- Los clientes se cargarán aquí -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/clientes.js"></script>
</body>
</html>
