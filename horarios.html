<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horarios - FitLife Gym</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
    <!-- ===== NAVEGACIÓN ===== -->
    <nav class="dashboard-nav">
        <h2>🏋️ FitLife Gym</h2>
        <ul>
            <li><a href="dashboard.html">📊 Dashboard</a></li>
            <li><a href="clientes.html">👥 Clientes</a></li>
            <li><a href="horarios.html" class="active">📅 Horarios</a></li>
            <li><a href="index.html">🏠 Inicio</a></li>
        </ul>
    </nav>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <main class="dashboard-main">
        <h1>Gestión de Horarios</h1>

        <!-- Formulario -->
        <section class="form-section">
            <h2 id="formTitleHorario">Agregar Nuevo Horario</h2>
            <form id="horarioForm">
                <input type="hidden" id="horarioId" />
                <div class="form-group">
                    <label for="cliente">Cliente:</label>
                    <select id="cliente" required>
                        <option value="">Seleccione un cliente...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="dia">Día:</label>
                    <select id="dia" required>
                        <option value="Lunes">Lunes</option>
                        <option value="Martes">Martes</option>
                        <option value="Miércoles">Miércoles</option>
                        <option value="Jueves">Jueves</option>
                        <option value="Viernes">Viernes</option>
                        <option value="Sábado">Sábado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="hora">Hora:</label>
                    <input type="time" id="hora" required />
                </div>
                <div class="form-group">
                    <label for="entrenador">Entrenador:</label>
                    <input type="text" id="entrenador" placeholder="Ej: Carlos" required />
                </div>
                <button type="submit" id="btnGuardarHorario">Guardar Horario</button>
                <button type="button" id="btnCancelarHorario" style="display: none">Cancelar Edición</button>
            </form>
        </section>

        <!-- Tabla -->
        <section class="table-section">
            <h2>Lista de Horarios</h2>
            <div class="table-container">
                <table id="tablaHorarios">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Día</th>
                            <th>Hora</th>
                            <th>Entrenador</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTablaHorarios">
                        <!-- Los horarios se cargarán aquí -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/horarios.js"></script>
</body>
</html>
